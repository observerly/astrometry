name: astrometry/publish

on:
  release:
    types: [published]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  publish:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [26]

    # Required for npm trusted publishing via OIDC:
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v6

      # Setup .npmrc file to publish to the public npm registry
      - name: Setup node env 🏗 and .npmrc file to publish to npm
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          registry-url: 'https://registry.npmjs.org/'
          # Defaults to the user or organization that owns the workflow file:
          scope: '@observerly'

      - name: Cache node_modules 📦
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install pnpm globally
        run: npm install -g pnpm@8.6.12

      - name: Install project dependencies 👨🏻‍💻
        run: pnpm install

      - name: Build the package ready for publishing
        run: pnpm run build

      - name: Publish to NPM 📦
        run: npm publish --access public
